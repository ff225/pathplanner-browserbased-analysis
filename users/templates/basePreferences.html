{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="icon" type="image/png" href="{% static 'img/flavicon.png' %}">
    <link href="{% static 'css/theme.css' %}" rel="stylesheet">
    <link href="{% static 'css/preferences.css' %}" rel="stylesheet">
</head>
<body>
    <div id="formContainer" class="container">
        <a href="{% url 'home' %}" class="form-brand">
            <img src="{% static 'img/flavicon.png' %}" alt="Unimore Maps">
            <span>Unimore Maps</span>
        </a>
        <div class="preferences-header">
            <h2 id="myTitle">{% block h %}{% endblock %}</h2>
            <a href="{{ next_url }}" class="btn btn-secondary back-to-profile">
                Back
            </a>
        </div>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next_url }}">
            <table class="preferences-table">
                <thead>
                    <tr>
                        <th>Preference</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody>
                    {% for field in form %}
                        <tr>
                            <td><label>{{ field.label }}</label></td>
                            <td>
                                {{ field }}
                                <span id="{{ field.id_for_label }}_value" class="ml-2 slider-value"></span>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% block action %}{% endblock %}
            {% block href %}{% endblock %}
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            const comments = {
                '-1': 'Strongly against',
                '-0.5': 'Against',
                '0': 'Neutral',
                '0.5': 'In favor',
                '1': 'Strongly in favor'
            };

            document.querySelectorAll('input[type="range"]').forEach(slider => {
                const updateValueAndComment = (slider) => {
                    const value = slider.value;
                    const comment = comments[value];
                    const displaySpan = document.getElementById(`${slider.id}_value`);
                    displaySpan.textContent = `${comment}`;
                };

                // Update the span initially
                updateValueAndComment(slider);

                // Add event listener for input event
                slider.addEventListener('input', (event) => {
                    updateValueAndComment(event.target);
                });
            });
        });
    </script>
</body>
</html>
