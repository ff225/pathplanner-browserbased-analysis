graphhopper:
  datareader.file: ""
  graph.location: graph-cache

  profiles:
    - name: foot
      custom_model_files: [foot.json]
    - name: bike
      custom_model_files: [bike.json]
    - name: car
      custom_model_files: [car.json]

  profiles_ch: []
  profiles_lm: []

  graph.encoded_values: foot_access, foot_priority, foot_average_speed, hike_rating, bike_access, bike_priority, bike_average_speed, mtb_rating, road_class, road_class_link, road_environment, surface, smoothness, car_access, car_average_speed, max_speed, roundabout
  graph.dataaccess.default_type: RAM_STORE

  prepare.min_network_size: 200
  prepare.subnetworks.threads: 1
  routing.max_visited_nodes: 1000000
  routing.timeout_ms: 300000
  routing.non_ch.max_waypoint_distance: 1000000
  import.osm.ignored_highways: ""

server:
  application_connectors:
    - type: http
      port: 8989
      bind_host: 0.0.0.0
      max_request_header_size: 50k
  admin_connectors:
    - type: http
      port: 8990
      bind_host: 0.0.0.0
